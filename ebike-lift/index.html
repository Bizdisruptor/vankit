<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VanIQ Easy Lift</title>
<style>
  :root{--ink:#1f3a5f;--steel:#64b5f6;--alu:#9aa6b2;--gold:#D4AF37;--red:#c0392b;
    --grn:#2e7d32;--bg:#0e1726;--panel:#152238;--cg:#a24fd0;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);
    color:#dfe7f2;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px;}
  .brand{display:flex;align-items:baseline;gap:8px;margin:2px 0;}
  .brand h1{font-size:22px;margin:0;color:#fff;letter-spacing:.5px;}
  .brand .tag{font-size:12px;color:var(--steel);font-weight:600;}
  .sub{font-size:12px;color:#9fb0c6;margin-bottom:10px;text-align:center;max-width:760px;}
  .modebar{display:flex;gap:0;margin-bottom:10px;border:1px solid #33455f;border-radius:8px;overflow:hidden;}
  .modebar button{background:#152238;color:#9fb0c6;border:none;padding:8px 20px;font-weight:700;cursor:pointer;font-size:13px;}
  .modebar button.active{background:var(--steel);color:#06121f;}
  .stage{background:#f5f7fb;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.4);}
  .panel{background:var(--panel);border:1px solid #33455f;border-radius:10px;padding:14px 18px;margin-top:12px;max-width:820px;width:100%;}
  .controls{display:flex;flex-wrap:wrap;gap:13px;align-items:center;}
  .controls .row{display:flex;flex-direction:column;gap:2px;font-size:11px;min-width:150px;}
  .controls label{color:#9fb0c6;}
  .controls input[type=range]{width:100%;}
  .val{color:var(--steel);font-weight:600;}
  button.act{background:var(--steel);color:#06121f;border:none;padding:9px 16px;border-radius:7px;font-weight:700;cursor:pointer;font-size:13px;}
  button.sec{background:#33455f;color:#dfe7f2;}
  .checklist{font-size:15px;line-height:1.9;}
  .checklist .ok{color:#5fd35f;font-weight:600;}
  .checklist .bad{color:#ff6b6b;font-weight:600;}
  .effort-wrap{margin-top:10px;}
  .meter{display:inline-block;font-family:monospace;font-size:18px;letter-spacing:2px;color:var(--gold);}
  .eff-label{font-size:13px;color:#9fb0c6;}
  .fitform{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;}
  .fitform .row{display:flex;flex-direction:column;gap:3px;font-size:12px;}
  .fitform input{background:#0e1726;border:1px solid #33455f;color:#fff;border-radius:6px;padding:7px;width:130px;font-size:13px;}
  .big{font-size:17px;font-weight:700;color:#fff;}
  .eng{font-size:12px;color:#9fb0c6;}
  .eng b{color:var(--gold);}
  h3{margin:6px 0 4px;color:var(--steel);font-size:14px;}
  svg text{font-family:system-ui,sans-serif;}
</style>
</head>
<body>
  <div class="brand"><h1>VanIQ Easy Lift</h1><span class="tag">motorless e-bike door lift</span></div>
  <div class="sub">Lifts a full-size e-bike onto your van&rsquo;s rear door. You lift the front wheel about 26&Prime; into the cradle; gas struts do the rest. Built for Ford Transit High Roof.</div>

  <div class="modebar">
    <button id="mCust" class="active">Customer view</button>
    <button id="mEng">Engineering view</button>
  </div>

  <svg id="scene" class="stage" width="780" height="600" viewBox="0 0 780 600"></svg>

  <!-- CUSTOMER PANEL -->
  <div id="custPanel" class="panel">
    <h3>Will my bike fit?</h3>
    <div class="fitform">
      <div class="row"><label>Wheel diameter (in)</label><input type="number" id="fWheel" value="29" step="0.5"></div>
      <div class="row"><label>Wheelbase (in)</label><input type="number" id="fWbase" value="50.5" step="0.5"></div>
      <div class="row"><label>Bike weight (lb)</label><input type="number" id="fWeight" value="70" step="5"></div>
      <button class="act" id="fCheck">Check fit</button>
      <button class="act" id="playC">&#9654; See it lift</button>
    </div>
    <div id="fitResult" class="checklist" style="margin-top:12px;"></div>
    <div class="effort-wrap">
      <span class="eff-label">Owner lift effort:</span>
      <span class="meter" id="effMeter">&#9633;&#9633;&#9633;&#9633;&#9633;&#9633;</span>
      <span class="eff-label" id="effLabel"></span>
    </div>
  </div>

  <!-- ENGINEERING PANEL -->
  <div id="engPanel" class="panel" style="display:none;">
    <div class="controls">
      <button class="act" id="playE">&#9654; Run Lift</button>
      <button class="act sec" id="resetE">Reset</button>
      <div class="row"><label>Anchor height: <span class="val" id="pivVal"></span> in</label>
        <input type="range" id="pivHt" min="30" max="50" step="0.5" value="40"></div>
      <div class="row"><label>Arm length: <span class="val" id="armVal"></span> in</label>
        <input type="range" id="armLen" min="30" max="48" step="0.5" value="40"></div>
      <div class="row"><label>Anchor standoff: <span class="val" id="stdVal"></span> in</label>
        <input type="range" id="standoff" min="0" max="6" step="0.5" value="0.5"></div>
      <div class="row"><label>Load angle: <span class="val" id="loadVal"></span>&deg;</label>
        <input type="range" id="loadAng" min="-55" max="-20" step="1" value="-45"></div>
      <div class="row"><label>Stow angle: <span class="val" id="stowVal"></span>&deg;</label>
        <input type="range" id="stowAng" min="80" max="90" step="1" value="90"></div>
      <div class="row"><label>Arm spacing: <span class="val" id="spcVal"></span> in</label>
        <input type="range" id="armSpc" min="6" max="14" step="0.5" value="10"></div>
      <div class="row"><label>Wheel dia: <span class="val" id="whVal"></span> in</label>
        <input type="range" id="wheelD" min="24" max="29" step="0.5" value="29"></div>
      <div class="row"><label>Wheelbase: <span class="val" id="wbVal"></span> in</label>
        <input type="range" id="wbase" min="40" max="52" step="0.5" value="50.5"></div>
    </div>
    <div class="eng" id="engReadout" style="margin-top:10px;"></div>
  </div>

<script>
const SVG=document.getElementById('scene');
const W=780,H=600,PXPERIN=5.0,GROUND_Y=H-45,DOOR_X=560;
const el=id=>document.getElementById(id);
function wy(yin){return GROUND_Y-yin*PXPERIN;}
const BUMPER=28.0, ROOF=110.0, BUMPER_OUT=8.0, CG_FRAC=0.46, CG_H=12.5;

let params={arm:40,pivH:40,standoff:0.5,loadAng:-45,stowAng:90,spc:10,wheelD:29,wbase:50.5,weight:70};
let theta=0,LOAD_T,RAISE_T,anim=null,mode='cust';

function svgEl(t,a){const e=document.createElementNS('http://www.w3.org/2000/svg',t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function clear(){while(SVG.firstChild)SVG.removeChild(SVG.firstChild);}
function add(t,a){const e=svgEl(t,a);SVG.appendChild(e);return e;}
function txt(x,y,s,fill,size,anchor,weight){const t=svgEl('text',{x,y,fill,'font-size':size||11,'text-anchor':anchor||'start','font-weight':weight||400});t.textContent=s;SVG.appendChild(t);return t;}

function geom(thetaDeg){
  const a=thetaDeg*Math.PI/180,r=params.wheelD/2,stdPx=params.standoff*PXPERIN;
  const lowPiv={x:DOOR_X-6-stdPx,y:wy(params.pivH)};
  const upPiv ={x:DOOR_X-6-stdPx,y:wy(params.pivH+params.spc)};
  const dx=-params.arm*PXPERIN*Math.cos(a),dy=-params.arm*PXPERIN*Math.sin(a);
  const lowTip={x:lowPiv.x+dx,y:lowPiv.y+dy};
  const upTip ={x:upPiv.x +dx,y:upPiv.y +dy};
  const fw={x:lowTip.x-r*PXPERIN,y:lowTip.y-r*PXPERIN};
  return {lowPiv,upPiv,lowTip,upTip,fw,r};
}
function bikeTiltAndRear(g){
  const r=params.wheelD/2,fA=(GROUND_Y-g.fw.y)/PXPERIN;
  let s=(fA-r)/params.wbase;
  if(s<=1)return {tilt:Math.asin(Math.max(-1,s)),rearGrounded:true};
  return {tilt:Math.PI/2,rearGrounded:false};
}
// effort: rope hand force (lb) at current angle, after struts
function effortAt(thetaDeg){
  // bike load torque profile (in-lb) interpolated; struts cancel via over-center.
  const a=thetaDeg*Math.PI/180;
  const r=params.wheelD/2;
  const g=geom(thetaDeg); const sol=bikeTiltAndRear(g);
  // approximate load torque about pivot
  const seat=params.pivH+params.arm*Math.sin(a);
  let loadT;
  if(sol.rearGrounded){
    const tilt=sol.tilt*180/Math.PI;
    const frontShare=(params.wbase*CG_FRAC)/params.wbase*params.weight+(params.weight*0.1)*Math.sin(tilt*Math.PI/180);
    loadT=frontShare*params.arm*Math.abs(Math.cos(a));
  } else {
    loadT=params.weight*Math.abs(params.arm*Math.cos(a));
  }
  // struts over-center: ~0 at load, ramps, surplus near top
  const frac=Math.max(0,(thetaDeg-params.loadAng)/(params.stowAng-params.loadAng));
  const strutT=Math.min(1800, 1800*Math.sin(frac*Math.PI*0.9));
  const resid=Math.max(0,loadT-strutT);
  // rope at arm end, 2:1
  return resid/params.arm/2;
}

function draw(){
  clear();
  const r=params.wheelD/2;
  add('rect',{x:0,y:GROUND_Y,width:W,height:H-GROUND_Y,fill:'#e7e2d8'});
  add('line',{x1:0,y1:GROUND_Y,x2:W,y2:GROUND_Y,stroke:'#888','stroke-width':2});
  txt(12,GROUND_Y+16,'GROUND','#777',11);
  // van + roof + bumper
  add('rect',{x:DOOR_X,y:wy(ROOF),width:W-DOOR_X-8,height:wy(0)-wy(ROOF),fill:'#eef1f5',stroke:'#1f3a5f','stroke-width':2.5});
  add('line',{x1:DOOR_X-130,y1:wy(ROOF),x2:W-8,y2:wy(ROOF),stroke:'#1f3a5f','stroke-width':1,'stroke-dasharray':'4 5','opacity':.5});
  txt(DOOR_X-128,wy(ROOF)-4,'ROOF 110"','#1f3a5f',10,'start',700);
  txt(DOOR_X+80,wy(ROOF)+18,'VAN','#1f3a5f',12,'start',700);
  const bumpRearX=DOOR_X-BUMPER_OUT*PXPERIN;
  add('rect',{x:bumpRearX,y:wy(BUMPER),width:DOOR_X-bumpRearX+4,height:wy(0)-wy(BUMPER),fill:'#1f3a5f','opacity':.28});
  txt(bumpRearX-4,wy(BUMPER)-4,'BUMPER 28"','#1f3a5f',10,'end',700);
  // door frame
  const frameTop=wy(ROOF-4),frameBot=wy(BUMPER-2),frX=DOOR_X-6;
  add('rect',{x:frX-2,y:frameTop,width:14,height:frameBot-frameTop,fill:'none',stroke:'#2c3e50','stroke-width':5});

  const g=geom(theta);
  // pulley
  const apex={x:frX+4,y:frameTop+6}; add('circle',{cx:apex.x,cy:apex.y,r:6,fill:'none',stroke:'#c0392b','stroke-width':2.5});
  // anchor
  [g.lowPiv,g.upPiv].forEach(p=>add('circle',{cx:p.x,cy:p.y,r:4,fill:'#1f3a5f'}));
  // arms
  add('line',{x1:g.lowPiv.x,y1:g.lowPiv.y,x2:g.lowTip.x,y2:g.lowTip.y,stroke:'#9aa6b2','stroke-width':6,'stroke-linecap':'round'});
  add('line',{x1:g.upPiv.x,y1:g.upPiv.y,x2:g.upTip.x,y2:g.upTip.y,stroke:'#9aa6b2','stroke-width':6,'stroke-linecap':'round'});
  // cradle
  add('line',{x1:g.upTip.x,y1:g.upTip.y,x2:g.lowTip.x,y2:g.lowTip.y,stroke:'#64b5f6','stroke-width':5,'stroke-linecap':'round'});
  const seatEnd={x:g.lowTip.x-(r+2)*PXPERIN,y:g.lowTip.y};
  add('line',{x1:g.lowTip.x,y1:g.lowTip.y,x2:seatEnd.x,y2:seatEnd.y,stroke:'#64b5f6','stroke-width':5,'stroke-linecap':'round'});

  // bike + CG
  const span=params.wbase*PXPERIN,fw=g.fw,sol=bikeTiltAndRear(g),tilt=sol.tilt;
  const ux=-Math.cos(tilt),uy=Math.sin(tilt);
  let rw={x:fw.x+ux*span,y:fw.y+uy*span};
  if(sol.rearGrounded)rw.y=GROUND_Y-r*PXPERIN;
  [fw,rw].forEach(wc=>{
    add('circle',{cx:wc.x,cy:wc.y,r:r*PXPERIN,fill:'none',stroke:'#1b5e20','stroke-width':3.5});
    add('circle',{cx:wc.x,cy:wc.y,r:3,fill:'#777'});
    for(let k=0;k<8;k++){const sa=k*Math.PI/4;add('line',{x1:wc.x,y1:wc.y,x2:wc.x+(r*PXPERIN-3)*Math.cos(sa),y2:wc.y+(r*PXPERIN-3)*Math.sin(sa),stroke:'#ccc','stroke-width':1});}
  });
  const mid={x:(fw.x+rw.x)/2,y:(fw.y+rw.y)/2},pxn=-uy,pyn=ux,top={x:mid.x+pxn*r*PXPERIN*0.85,y:mid.y+pyn*r*PXPERIN*0.85};
  [[fw,top],[rw,top],[fw,mid],[rw,mid],[mid,top]].forEach(([p,q])=>add('line',{x1:p.x,y1:p.y,x2:q.x,y2:q.y,stroke:'#2e7d32','stroke-width':2.5}));
  // CG dot (purple) at 46% from front along bike axis
  const cg={x:fw.x+ux*span*CG_FRAC,y:fw.y+uy*span*CG_FRAC};
  add('circle',{cx:cg.x,cy:cg.y,r:6,fill:'#a24fd0',stroke:'#fff','stroke-width':1.5,zorder:9});
  add('line',{x1:cg.x,y1:cg.y,x2:cg.x,y2:cg.y+18,stroke:'#a24fd0','stroke-width':2});
  txt(cg.x+8,cg.y,'CG','#7a3fb0',11,'start',700);

  // rope
  add('line',{x1:apex.x,y1:apex.y,x2:g.upTip.x,y2:g.upTip.y,stroke:'#c0392b','stroke-width':1.6,'stroke-dasharray':'5 4'});

  // load label
  if(theta<=LOAD_T+1){
    txt(g.fw.x-r*PXPERIN-6,g.fw.y,'lift front wheel here','#2e7d32',11,'end',700);
  }
  // live effort badge on stage
  const eff=effortAt(theta);
  add('rect',{x:14,y:14,width:150,height:30,rx:6,fill:'#1f3a5f','opacity':.92});
  txt(22,33,'effort: '+eff.toFixed(0)+' lb','#fff',14,'start',700);
}

function recompute(){LOAD_T=params.loadAng;RAISE_T=params.stowAng;if(theta<LOAD_T)theta=LOAD_T;}
function reset(){if(anim)cancelAnimationFrame(anim);recompute();theta=LOAD_T;draw();updatePanels();}
function run(cb){if(anim)cancelAnimationFrame(anim);recompute();theta=LOAD_T;
  (function step(){theta+=0.8;if(theta>=RAISE_T){theta=RAISE_T;draw();updatePanels();if(cb)cb();return;}
   draw();updatePanels();if(cb)updateEffortLive();anim=requestAnimationFrame(step);})();}

function seatAt(t){return params.pivH+params.arm*Math.sin(t*Math.PI/180);}

function fitChecks(){
  const r=params.wheelD/2;
  const loadSeat=seatAt(params.loadAng), stowSeat=seatAt(params.stowAng);
  const ownerLift=loadSeat+r;
  const fwTop=stowSeat+params.wheelD;
  const stowFA=stowSeat+r; const sStow=(stowFA-r)/params.wbase;
  const rwBot=sStow<=1?0:(stowFA-params.wbase-r);
  const reachOut=params.standoff+params.arm*Math.cos(params.loadAng*Math.PI/180);
  return {
    roof: fwTop<=ROOF,
    bumper: reachOut>BUMPER_OUT || loadSeat>BUMPER,
    rear: rwBot>0,
    lift: ownerLift,
    fwTop, rwBot, loadSeat, ownerLift, stowSeat
  };
}

function updatePanels(){
  if(mode==='cust') updateCust(); else updateEng();
  updateEffortLive();
}
function updateCust(){
  const c=fitChecks();
  const fits = c.roof && c.rear;
  el('fitResult').innerHTML=
    line(true,'Fits Ford Transit High Roof')+
    line(c.roof,`Clears roof (front wheel top ${c.fwTop.toFixed(0)}" &lt; 110")`)+
    line(c.bumper,'Clears rear bumper')+
    line(c.rear,`Safe transport position (rear wheel ${c.rwBot.toFixed(0)}" off ground)`)+
    line(true,`You only lift the front wheel ${c.ownerLift.toFixed(0)}"`)+
    `<div style="margin-top:8px;font-size:16px;font-weight:700;color:${fits?'#5fd35f':'#ff6b6b'}">`+
    `${fits?'\u2714 Compatible with VanIQ Easy Lift':'\u2717 This configuration needs adjustment'}</div>`;
}
function line(ok,t){return `<div><span class="${ok?'ok':'bad'}">${ok?'\u2714':'\u2717'}</span> ${t}</div>`;}

function updateEffortLive(){
  const eff=effortAt(theta);
  const maxEff=30; const filled=Math.min(6,Math.round(eff/maxEff*6));
  let m=''; for(let i=0;i<6;i++)m+= i<filled?'\u25A0':'\u25A1';
  el('effMeter').innerHTML=m;
  let phase = theta<=LOAD_T+5?'ground load':(theta>=RAISE_T-15?'near vertical':'mid lift');
  el('effLabel').textContent=`${eff.toFixed(0)} lb (${phase})`;
}

function updateEng(){
  const c=fitChecks();
  el('engReadout').innerHTML=
    `Anchor <b>${params.pivH}"</b> / standoff <b>${params.standoff}"</b> / arm <b>${params.arm}"</b> / spacing <b>${params.spc}"</b><br>`+
    `Load angle <b>${params.loadAng}\u00b0</b> &rarr; stow <b>${params.stowAng}\u00b0</b> (sweep ${(params.stowAng-params.loadAng)}\u00b0)<br>`+
    `Cradle load base <b>${c.loadSeat.toFixed(1)}"</b> | owner lifts axle to <b>${c.ownerLift.toFixed(1)}"</b><br>`+
    `Stow: front wheel top <b>${c.fwTop.toFixed(1)}"</b> (roof ${ROOF}, ${c.roof?'clears':'OVER'}) | rear wheel <b>${c.rwBot.toFixed(1)}"</b> off ground<br>`+
    `Peak owner effort ~<b>${Math.max(effortAt(params.loadAng+30),effortAt(params.loadAng+40)).toFixed(0)} lb</b> (struts carry the rest)`;
}

// mode switch
function setMode(m){
  mode=m;
  el('mCust').classList.toggle('active',m==='cust');
  el('mEng').classList.toggle('active',m==='eng');
  el('custPanel').style.display=m==='cust'?'block':'none';
  el('engPanel').style.display=m==='eng'?'block':'none';
  reset();
}
el('mCust').onclick=()=>setMode('cust');
el('mEng').onclick=()=>setMode('eng');

// customer fit form
el('fCheck').onclick=()=>{
  params.wheelD=parseFloat(el('fWheel').value)||29;
  params.wbase=parseFloat(el('fWbase').value)||50.5;
  params.weight=parseFloat(el('fWeight').value)||70;
  reset();
};
el('playC').onclick=()=>run(true);

// engineering controls
function syncEng(){
  el('pivVal').textContent=params.pivH.toFixed(1);el('armVal').textContent=params.arm.toFixed(1);
  el('stdVal').textContent=params.standoff.toFixed(1);el('loadVal').textContent=params.loadAng.toFixed(0);
  el('stowVal').textContent=params.stowAng.toFixed(0);el('spcVal').textContent=params.spc.toFixed(1);
  el('whVal').textContent=params.wheelD.toFixed(1);el('wbVal').textContent=params.wbase.toFixed(1);
}
['pivHt','armLen','standoff','loadAng','stowAng','armSpc','wheelD','wbase'].forEach(id=>{
  el(id).addEventListener('input',()=>{
    params.pivH=parseFloat(el('pivHt').value);params.arm=parseFloat(el('armLen').value);
    params.standoff=parseFloat(el('standoff').value);params.loadAng=parseFloat(el('loadAng').value);
    params.stowAng=parseFloat(el('stowAng').value);params.spc=parseFloat(el('armSpc').value);
    params.wheelD=parseFloat(el('wheelD').value);params.wbase=parseFloat(el('wbase').value);
    syncEng();reset();});
});
el('playE').onclick=()=>run(true);
el('resetE').onclick=reset;

syncEng();
recompute(); theta=LOAD_T;
el('fCheck').click();
setMode('cust');
</script>
</body>
</html>
